<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CL Monitoring{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="shell site-header__row">
            <a class="brand" href="{{ url_for('project_board') }}">CL Monitoring</a>
            <nav class="site-nav" aria-label="Primary">
                <a href="{{ url_for('project_board') }}">Project board</a>
                <a href="{{ url_for('incidents') }}">Incidents</a>
            </nav>
        </div>
        <div class="shell site-header__note">
            Local SQLite dashboard. Browser pages read only local truth and never call Crawlab.
        </div>
    </header>
    <main class="shell page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
